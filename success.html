<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="color-scheme" content="light">
<title>Request received | Mike Basch Mortgage Team</title>
<link rel="icon" href="favicon.ico" sizes="32x32 64x64">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:"Rift"; src:url("fonts/rift-demi.woff") format("woff"); font-weight:600; font-style:normal; font-display:swap;}
@font-face{font-family:"Rift"; src:url("fonts/rift-bold.woff") format("woff"); font-weight:700; font-style:normal; font-display:swap;}
:root{
  --blue:#081828; --green:#558C8C; --gold:#FFDA88; --red:#EE6C4D; --red-deep:#D9572F;
  --gray:#F0EFF4; --white:#FFFFFF; --ink:#12242e; --mute:#5d707b; --line:#e4e7ec;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--gray); color:var(--ink); font-family:"Montserrat",sans-serif; color-scheme:light; min-height:100vh; display:grid; place-items:center; padding:24px;}
.card{background:#fff; border:1px solid var(--line); border-left:6px solid var(--gold); border-radius:20px; box-shadow:0 18px 50px rgba(8,24,40,.14); max-width:620px; width:100%; padding:46px 44px; text-align:center;}
.logo{width:96px; height:96px; margin:0 auto 18px; display:block;}
h1{font-family:"Rift","Oswald",sans-serif; text-transform:uppercase; font-size:clamp(30px,5vw,40px); line-height:1.04; color:var(--blue); margin:0 0 14px;}
h1 span{color:var(--red);}
p{font-size:16.5px; line-height:1.65; color:var(--ink); margin:0 0 26px;}
.btn{display:inline-block; background:var(--red); color:#fff; text-decoration:none; font-family:"Rift","Oswald",sans-serif; text-transform:uppercase; letter-spacing:.04em; font-size:15px; padding:14px 28px; border-radius:999px; transition:background .15s ease, transform .12s ease;}
.btn:hover{background:var(--red-deep); transform:translateY(-1px);}
.small{font-size:12.5px; color:var(--mute); margin:22px 0 0;}
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="logo-circle.png" alt="Mike Basch Mortgage Team logo">
    <h1>Thank <span>you!</span></h1>
    <p>Your request has been submitted to Michael. He will be in touch shortly to help figure out which programs are the best fit for you!</p>
    <a class="btn" href="/">Back to our site</a>
    <p class="small">Michael Basch · NMLS #1721748 · First Home Mortgage · NMLS #71603</p>
  </main>
</body>
</html>
